name: Integracion Continua (CI)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. Clonar el repositorio
      uses: actions/checkout@v3
      
    - name: 2. Configurar Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: 3. Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 4. Revisar calidad del codigo (Flake8)
      run: |
        # Revisa que el código no tenga errores de sintaxis o desorden
        flake8 src/ tests/
        
    - name: 5. Ejecutar Pruebas Unitarias (Pytest)
      env:
        PYTHONPATH: .
      run: |
        # Ejecuta las pruebas automatizadas
        pytest tests/
